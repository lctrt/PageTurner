services:
  postgres:
    image: postgres:18.3-alpine3.23
    ports:
      - "5432:5432"
    volumes:
      - ./pg-data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  redis:
    image: redis:8.6.2-alpine3.23

  api:
    image: docker-vm-1:5000/books-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  client:
    image: docker-vm-1:5000/books-client
    ports:
      - "5173:5173"
    environment:
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - api
volumes:
  pg-data:
