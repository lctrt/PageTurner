apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: pageturner
data:
  POSTGRES_DB: books
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pageturner
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: pageturner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.3-alpine3.23
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: pageturner-secrets
          ports:
            - containerPort: 5432

