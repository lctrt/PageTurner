apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: pageturner
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pageturner-api-ingress
  namespace: pageturner
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: pageturner-strip-api@kubernetescrd
spec:
  tls: 
    - hosts: 
        - pageturner.local
      secretName: pageturner-tls
  rules:
    - host: pageturner.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pageturner-client-ingress
  namespace: pageturner
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls: 
    - hosts: 
        - pageturner.local
      secretName: pageturner-tls
  rules:
    - host: pageturner.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 5173
