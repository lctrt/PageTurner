apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pageturner
spec:
  selector:
    app: api
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 31002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: pageturner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: docker-vm-1:5000/books-api 
          ports:
            - containerPort: 8080



